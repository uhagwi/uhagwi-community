name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 린트
        run: pnpm lint

      - name: 타입 검사
        run: pnpm typecheck

      - name: 빌드
        run: pnpm build
        env:
          # CI용 더미값 — 빌드만 검증
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-dummy-secret-do-not-use
          DISCORD_CLIENT_ID: ci-dummy
          DISCORD_CLIENT_SECRET: ci-dummy
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: ci-dummy
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
