<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="채널 콘텐츠 큐레이션 자동화 하네스 썸네일">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="60%" stop-color="#fdf8e8"/>
      <stop offset="100%" stop-color="#f4f1fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b3fa8"/>
      <stop offset="55%" stop-color="#ff5c9a"/>
      <stop offset="100%" stop-color="#a8e6d0"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1e9d6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5b3fa8" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- 카드 배경 (둥근 크림) -->
  <rect x="0" y="0" width="1200" height="800" rx="36" fill="url(#bg)"/>
  <!-- 상단 accent 바 (관제탑 .card::before 차용) -->
  <rect x="0" y="0" width="1200" height="14" rx="7" fill="url(#accent)"/>

  <!-- 우하귀 물결 모티프 -->
  <path d="M0 690 C 200 650, 360 740, 600 700 S 1000 650, 1200 700 L1200 800 L0 800 Z"
        fill="#a8e6d0" opacity="0.30"/>
  <path d="M0 730 C 240 700, 420 770, 660 735 S 1010 700, 1200 740 L1200 800 L0 800 Z"
        fill="#5b3fa8" opacity="0.10"/>

  <!-- 페르소나 칩 -->
  <g transform="translate(80,86)">
    <rect x="0" y="0" width="320" height="52" rx="26" fill="#ffffff" stroke="#c9c2d4" stroke-width="1.5"/>
    <circle cx="34" cy="26" r="13" fill="#ff5c9a"/>
    <text x="62" y="34" font-family="'Pretendard',system-ui,sans-serif" font-size="22" font-weight="700" fill="#5b3fa8">큐레이터 · 콘텐츠 자동화</text>
  </g>

  <!-- 이모지 + 타이틀 -->
  <text x="80" y="278" font-family="system-ui,'Segoe UI Emoji',sans-serif" font-size="120">💡</text>
  <text x="80" y="396" font-family="'Pretendard',system-ui,sans-serif" font-size="60" font-weight="800" fill="#1a1622">채널 콘텐츠</text>
  <text x="80" y="470" font-family="'Pretendard',system-ui,sans-serif" font-size="60" font-weight="800" fill="#1a1622">큐레이션 자동화</text>
  <text x="84" y="528" font-family="'Pretendard',system-ui,sans-serif" font-size="26" font-weight="500" fill="#5b5370">사람이 큐레이션하지 않는다 · 주기마다 자동 적립</text>

  <!-- 미니 3노드 플로우 (구조도 컨셉과 일관) -->
  <g transform="translate(80,584)" filter="url(#soft)">
    <rect x="0" y="0" width="270" height="84" rx="20" fill="url(#node)" stroke="#5b3fa8" stroke-width="2"/>
    <text x="135" y="51" text-anchor="middle" font-family="'Pretendard',system-ui,sans-serif" font-size="26" font-weight="700" fill="#2e1f5e">채널 수확</text>

    <path d="M286 42 L356 42" stroke="#5b3fa8" stroke-width="4" stroke-linecap="round"/>
    <path d="M348 33 L360 42 L348 51 Z" fill="#5b3fa8"/>

    <rect x="372" y="0" width="270" height="84" rx="20" fill="url(#node)" stroke="#ff5c9a" stroke-width="2"/>
    <text x="507" y="51" text-anchor="middle" font-family="'Pretendard',system-ui,sans-serif" font-size="26" font-weight="700" fill="#2e1f5e">3축 점수화</text>

    <path d="M658 42 L728 42" stroke="#5b3fa8" stroke-width="4" stroke-linecap="round"/>
    <path d="M720 33 L732 42 L720 51 Z" fill="#5b3fa8"/>

    <rect x="744" y="0" width="296" height="84" rx="20" fill="url(#node)" stroke="#3bb273" stroke-width="2"/>
    <text x="892" y="51" text-anchor="middle" font-family="'Pretendard',system-ui,sans-serif" font-size="26" font-weight="700" fill="#2e1f5e">다채널 배포</text>
  </g>

  <!-- 우하귀 워터마크 -->
  <text x="1120" y="120" text-anchor="end" font-family="'Pretendard',system-ui,sans-serif" font-size="22" font-weight="800" fill="#5b3fa8" opacity="0.55">우하귀 🌊</text>
</svg>
